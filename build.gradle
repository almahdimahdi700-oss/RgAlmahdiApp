plugins {
    id 'com.android.application' version '8.2.2'
}

android {
    namespace 'com.rg.almahdi'
    compileSdk 34

    defaultConfig {
        applicationId "com.rg.almahdi"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    
    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            java {
                srcDirs = ['.']
                exclude '**/build/**'
                exclude '**/.gradle/**'
                exclude '**/.git/**'
            }
            res {
                srcDirs = ['.']
                exclude '**/build/**'
            }
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
